<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" href="styles3.css">
    </head>
    <body>
        <h1>Advanced Search</h1>
        <header>
            <nav>
                 <ul class="header-nav">
                     <a href="search.html">Google Search</a>
                     <a href="imagesearch.html">Image Search</a>
                 </ul>
            </nav>
        </header>
        <section>
            <form action="https://google.com/advanced_search">
                <input class="text-field" type="text" name="as_q" placeholder="усі ці слова:">
                <input class="text-field" type="text" name="as_epq" placeholder="точне слово або фразу:">
                <input class="text-field" type="text" name="as_oq" placeholder="будь-яке з цих слів:">
                <input class="text-field" type="text" name="as_eq" placeholder="жодне з цих слів:">
                <input class="text-field1" type="text" name="as_nlo" placeholder="числа в діапазоні від:">
                <input class="text-field2" type="text" name="as_nhi" placeholder="до:">
                <input class="button-search" type="submit" value="Advanced Search">
            </form>
        </section>
    </body>
</html>
